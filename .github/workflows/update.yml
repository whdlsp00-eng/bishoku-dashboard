name: Update dashboard

on:
  schedule:
    # 매일 23:30 UTC = 한국시간 오전 8:30
    # GitHub Actions cron은 종종 5~15분 지연될 수 있음
    - cron: "30 23 * * *"
  workflow_dispatch: # 수동 실행 가능
    inputs:
      reason:
        description: "수동 실행 사유 (선택)"
        required: false

permissions:
  contents: write

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run update script
        env:
          BISHOKU_MONO_API_KEY: ${{ secrets.BISHOKU_MONO_API_KEY }}
        run: python scripts/update.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html history.json data.json
          if git diff --cached --quiet; then
            echo "변경사항 없음"
          else
            DATE=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "Update dashboard $DATE"
            git push
          fi

      - name: Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          exclude_assets: '.github,scripts,README.md,.gitignore'
